name: Ultra Stream Bot — 24/7

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Restore channels
        run: |
          echo '${{ secrets.CHANNELS_JSON }}' > channels.json
          echo "✅ Channels restored"

      - name: Run Bot
        env:
          BOT_TOKEN:         ${{ secrets.BOT_TOKEN }}
          ADMIN_IDS:         ${{ secrets.ADMIN_IDS }}
          MECCA_STREAM_URL:  ${{ secrets.MECCA_STREAM_URL }}
          MADINA_STREAM_URL: ${{ secrets.MADINA_STREAM_URL }}
          PORT:              3000
        run: node bot.js
